<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carta</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f2f5;
            padding: 20px;
            color: #333;
        }
        .carta {
            background-color: #ffffff;
            max-width: 500px; /* Largura menor para um visual mais simples */
            margin: 0 auto; /* Centraliza a carta na tela */
            padding: 30px;
            border: 1px solid #ddd;
            border-radius: 8px; /* Cantos levemente arredondados */
        }
        p {
            line-height: 1.6; /* Espaçamento confortável entre as linhas */
            font-size: 16px;
        }
    </style>
</head>
<body>

    <div class="carta">
        <p>Olá,</p>
        
        <p>Estou escrevendo esta carta para compartilhar algumas palavras com você. Espero que esta mensagem te encontre bem e traga um sorriso ao seu rosto.</p>
        

        <p>Com carinho,</p>
        <p><strong>André</strong></p>
    </div>

</body>
</html>
